name: Daily Lead Scraper

on:
  schedule:
    # 9 AM EST = 14:00 UTC (winter) / 13:00 UTC (summer)
    # Using 14:00 UTC ensures 9 AM EST in winter; summer will be 10 AM EDT
    - cron: '0 14 * * *'
  workflow_dispatch:  # Allow manual trigger for testing

jobs:
  run-scraper:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    env:
      TZ: America/New_York  # Ensure logs/timestamps use EST
      GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
      PYTHONUNBUFFERED: 1   # Force immediate log output
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Write credentials to file
        run: |
          echo "$GOOGLE_CREDS_JSON" > credentials.json
          chmod 600 credentials.json

      - name: Run scraper
        run: python main.py

      - name: Upload logs as artifact (for debugging)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: scraper-logs-${{ github.run_id }}
          path: |
            run.log
            credentials.json
          retention-days: 7